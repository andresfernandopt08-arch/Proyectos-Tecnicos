  <style>
    :root {
      --brand-blue: #003366;
      --brand-orange: #FF6600;
      --deep-navy: #001529;
    }
    
    body { background-color: var(--deep-navy); margin: 0; overflow: hidden; font-family: 'Sora', sans-serif; }

    .dynamic-bg {
      position: fixed;
      inset: -50px;
      background: linear-gradient(135deg, #001529 0%, #003366 40%, #803300 85%, #FF6600 100%);
      background-size: 200% 200%;
      animation: gradientFlow 12s ease-in-out infinite alternate;
      z-index: -1;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .light-particle {
      position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0.3;
      will-change: transform; animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translate3d(0, 105vh, 0); opacity: 0; }
      100% { transform: translate3d(0, -10vh, 0); opacity: 0; }
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .link-button {
      background: linear-gradient(135deg, #004080 0%, #0066cc 100%);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-decoration: none;
    }

    .link-button:hover {
      transform: translateY(-3px);
      background: linear-gradient(135deg, var(--brand-orange) 0%, #ff8c00 100%);
      box-shadow: 0 10px 20px rgba(255, 102, 0, 0.4);
    }

    .logo-container {
      outline: 4px solid white;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      animation: softFloat 4s ease-in-out infinite;
    }

    @keyframes softFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .pulse-ring {
      position: absolute; inset: 0; border: 3px solid var(--brand-orange); border-radius: 50%; animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.6); opacity: 0; }
    }
  </style>
</head>
